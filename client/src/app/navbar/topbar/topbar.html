<header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 px-4 py-2">
  <div class="flex items-center justify-between">
    <!-- Logo -->
    <a routerLink="/home" class="flex items-center space-x-2 cursor-pointer group">
      <span class="text-xl font-bold text-teal-600 dark:text-teal-400 group-hover:text-teal-700 dark:group-hover:text-teal-300 transition-all duration-200 border-b-2 border-transparent group-hover:border-teal-600 dark:group-hover:border-teal-400">Meme Museum</span>
    </a>
    
    <!-- Search Bar -->
    <form (ngSubmit)="this.search(searchInput.value)" class="hidden sm:flex flex-1 max-w-lg mx-8">
      <div class="relative w-full">
        <input
          #searchInput
          type="text"
          placeholder="Search meme by tag (separated by commas)..."
          class="w-full px-4 py-2 pl-10 pr-4 text-sm border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent dark:bg-gray-800 dark:border-gray-600 dark:text-white dark:placeholder-gray-400"
        >
        <button type="submit" aria-label="Search" class="absolute inset-y-0 left-0 pl-3 flex items-center cursor-pointer">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </button>
      </div>
    </form>

    <!-- User Actions -->
    <div class="flex items-center space-x-4">

      <!-- Dark Mode Toggle -->
      <dark-mode-toggle />
            
      <!-- Auth Buttons -->
      @if(!this.authService.isUserAuthenticated()) {
        <div class="flex items-center space-x-2">
          <a
            routerLink="/login"
            class="px-4 py-1.5 text-sm font-semibold text-white bg-teal-600 border border-teal-600 rounded-full hover:bg-teal-700 hover:border-teal-700 focus:outline-none focus:ring-2 focus:ring-teal-500 cursor-pointer hover:text-white dark:bg-teal-500 dark:border-teal-500 dark:hover:bg-teal-600 dark:focus:ring-teal-700"
          >
            Log In
          </a>
          <a
            routerLink="/signup"
            class="px-4 py-1.5 text-sm font-semibold text-teal-600 dark:text-teal-400 border border-teal-600 dark:border-teal-400 rounded-full hover:bg-teal-50 dark:hover:bg-gray-800 cursor-pointer focus:outline-none focus:ring-2 focus:ring-teal-500"
          >
            Sign Up
          </a>
        </div>
      } @else {
        <div class="relative" #userMenuContainer>
          <button
            type="button"
            (click)="this.toggleUserMenu()"
            class="flex items-center space-x-2 px-2 py-1 text-sm text-gray-700 dark:text-gray-300 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer focus:outline-none focus:ring-2 focus:ring-teal-500"
          >
            <span class="flex items-center justify-center w-7 h-7 rounded-full bg-teal-600 dark:bg-teal-500 text-white text-xs font-semibold">
              {{this.userInitial()}}
            </span>
            <strong class="hidden sm:inline">
              {{this.authService.userName()}}
            </strong>
            <svg class="hidden sm:block w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
            </svg>
          </button>

          @if(this.isUserMenuOpen()) {
            <div class="absolute right-0 mt-2 w-40 py-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg shadow-lg overflow-hidden z-50">
              <a
                routerLink="/logout"
                (click)="this.isUserMenuOpen.set(false)"
                class="block px-4 py-2 text-sm text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer"
              >
                Logout
              </a>
            </div>
          }
        </div>
      }

      <!-- Mobile Menu Button -->
      <button 
        (click)="this.sidebarService.toggleMobileSidebar()" 
        aria-label="Toggle mobile menu"
        class="lg:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 cursor-pointer"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>
  </div>
</header>
